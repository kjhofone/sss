<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>투자 스터디 · 현재가 확인</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="layout">
  <nav class="sidebar">
    <a href="index.html" class="logo" style="text-decoration:none;color:inherit;cursor:pointer;">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <polyline points="1,12 5,7 9,9 15,3" stroke="#185fa5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="11,3 15,3 15,7" stroke="#185fa5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      투자 스터디
    </a>
    <a href="index.html"    class="nav-item"><div class="nav-dot g"></div>대시보드</a>
    <a href="picks.html"    class="nav-item"><div class="nav-dot"></div>탑픽 관리</a>
    <a href="trade.html"    class="nav-item"><div class="nav-dot r"></div>매수 / 매도</a>
    <a href="members.html"  class="nav-item"><div class="nav-dot"></div>참여자 현황</a>
    <a href="settle.html"   class="nav-item"><div class="nav-dot a"></div>결산 관리</a>
    <a href="schedule.html" class="nav-item"><div class="nav-dot g"></div>스터디 일정</a>
    <a href="admin.html"    class="nav-item"><div class="nav-dot"></div>사용자 관리</a>
    <div class="sidebar-spacer"></div>
    <div class="sidebar-footer">
      <button class="btn" style="width:100%;font-size:12px;" onclick="doLogout()">로그아웃</button>
    </div>
  </nav>

  <main class="main">
    <div id="db-banner" class="db-banner pending">DB 연결 확인 중...</div>

    <div class="topbar">
      <div>
        <div class="page-title">현재가 확인</div>
        <div class="updated" id="lastUpdated">평일 16:10 자동 업데이트 · 대시보드에서 즉시 업데이트 가능</div>
      </div>
    </div>

    <!-- 탑픽 종목 현재가 -->
    <div class="card" style="margin-bottom:1.25rem;">
      <div class="card-head">
        <div class="card-title">탑픽 종목 현재가</div>
        <div style="font-size:12px;color:var(--muted);" id="pickUpdatedAt"></div>
      </div>
      <div id="pickList">
        <div class="muted" style="text-align:center;padding:2rem;">불러오는 중...</div>
      </div>
    </div>

    <!-- 전종목 검색 -->
    <div class="card">
      <div class="card-head">
        <div class="card-title">종목 검색</div>
        <div style="font-size:12px;color:var(--muted);">KOSPI·KOSDAQ 전종목 검색 가능</div>
      </div>
      <div style="margin-bottom:12px;">
        <input type="text" id="searchInput"
          placeholder="종목명 또는 코드 입력 (예: 삼성전자 또는 005930)"
          style="width:100%;padding:8px 12px;font-size:13px;"
          oninput="searchStocks(this.value)" />
      </div>
      <div id="searchResult" style="font-size:13px;color:var(--muted);">
        2글자 이상 입력하면 검색합니다.
      </div>
    </div>
  </main>
</div>
<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script>
async function init() {
  await requireAuth();
  checkDBConnection();
  await loadPickStocks();
}

async function loadPickStocks() {
  const { data: picks } = await sb.from('picks')
    .select('stock_code, stock_name, market').not('stock_code', 'is', null);

  if (!picks || !picks.length) {
    document.getElementById('pickList').innerHTML =
      '<div class="muted" style="text-align:center;padding:2rem;">탑픽 종목이 없습니다</div>';
    return;
  }

  const codeMap = {};
  for (const p of picks) if (p.stock_code) codeMap[p.stock_code] = p;
  const codes = Object.keys(codeMap);

  const { data: prices } = await sb.from('stock_prices')
    .select('stock_code, price, change_rate, market_cap, updated_at').in('stock_code', codes);

  const priceMap = {};
  for (const p of (prices||[])) priceMap[p.stock_code] = p;

  const stocks = codes.map(code => ({
    ...codeMap[code], ...(priceMap[code] || { price:0, change_rate:0, market_cap:null, updated_at:null })
  })).sort((a,b) => (b.market_cap||0) - (a.market_cap||0));

  const latest = stocks.filter(s => s.updated_at && s.price > 0)
    .sort((a,b) => new Date(b.updated_at) - new Date(a.updated_at))[0];
  if (latest) {
    const d = new Date(latest.updated_at);
    const str = `${d.toLocaleDateString('ko-KR')} ${d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})} 기준`;
    document.getElementById('lastUpdated').textContent = '마지막 업데이트: ' + str;
    document.getElementById('pickUpdatedAt').textContent = str;
  }

  const el = document.getElementById('pickList');
  el.innerHTML = stocks.map(s => {
    const hasPrice = s.price && s.price > 0;
    const hasCap   = s.market_cap && s.market_cap > 0;
    const cls  = (s.change_rate||0) >= 0 ? 'up' : 'dn';
    const sign = (s.change_rate||0) >= 0 ? '+' : '';
    return `<div style="display:grid;grid-template-columns:200px 160px 160px;gap:12px;align-items:center;padding:12px 0;border-bottom:0.5px solid var(--border);">
      <div>
        <div style="font-weight:500;">${s.stock_name}</div>
        <div style="font-size:12px;color:var(--muted);">${s.stock_code} · <span class="badge b-hold">${s.market}</span></div>
      </div>
      <div>
        <div style="font-size:20px;font-weight:500;${hasPrice?'':'color:var(--muted)'}">
          ${hasPrice ? s.price.toLocaleString()+'원' : '미입력'}</div>
        ${hasPrice ? `<div class="${cls}" style="font-size:12px;">${sign}${(s.change_rate||0).toFixed(2)}%</div>` : ''}
      </div>
      <div style="font-size:13px;color:var(--muted);">${hasCap ? s.market_cap.toLocaleString()+'억원' : '-'}</div>
    </div>`;
  }).join('');
  const items = el.querySelectorAll('div[style*="border-bottom"]');
  if (items.length) items[items.length-1].style.borderBottom = 'none';
}

let searchTimer = null;
async function searchStocks(query) {
  clearTimeout(searchTimer);
  const el = document.getElementById('searchResult');
  if (!query || query.length < 2) {
    el.innerHTML = '<span style="color:var(--muted);">2글자 이상 입력하면 검색합니다.</span>';
    return;
  }
  searchTimer = setTimeout(async () => {
    el.innerHTML = '<span style="color:var(--muted);">검색 중...</span>';
    try {
      const { data } = await sb.from('stock_prices')
        .select('stock_code,stock_name,market,price,change_rate,market_cap,updated_at')
        .or(`stock_name.ilike.%${query}%,stock_code.ilike.%${query}%`)
        .gt('price', 0)
        .order('market_cap', { ascending:false, nullsFirst:false })
        .limit(10);

      if (!data || !data.length) { el.innerHTML = '<span style="color:var(--muted);">검색 결과 없음</span>'; return; }

      el.innerHTML = data.map(s => {
        const cls  = (s.change_rate||0) >= 0 ? 'up' : 'dn';
        const sign = (s.change_rate||0) >= 0 ? '+' : '';
        const d    = s.updated_at ? new Date(s.updated_at) : null;
        const t    = d && d.getFullYear() > 2000
          ? `${d.toLocaleDateString('ko-KR')} ${d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})}`
          : '-';
        return `<div style="display:grid;grid-template-columns:160px 140px 110px 100px 1fr;gap:8px;align-items:center;padding:10px 0;border-bottom:0.5px solid var(--border);font-size:13px;">
          <div style="font-weight:500;">${s.stock_name}</div>
          <div style="color:var(--muted);">${s.stock_code} · ${s.market}</div>
          <div style="font-weight:500;">${s.price ? s.price.toLocaleString()+'원' : '-'}</div>
          <div class="${cls}">${s.price ? sign+(s.change_rate||0).toFixed(2)+'%' : ''}</div>
          <div style="color:var(--muted);font-size:11px;">${t}</div>
        </div>`;
      }).join('');
    } catch(e) { el.innerHTML = '<span style="color:var(--up);">오류: ' + e.message + '</span>'; }
  }, 400);
}

async function doLogout() { await sb.auth.signOut(); location.href = 'index.html'; }
init();
</script>
</body>
</html>
