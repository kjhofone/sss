name: 주식 현재가 자동 업데이트

on:
  schedule:
    # 평일 장 마감 후 (KST 16:10 = UTC 07:10)
    - cron: '10 7 * * 1-5'
    # 평일 장 중간 (KST 12:00 = UTC 03:00)
    - cron: '0 3 * * 1-5'
  workflow_dispatch:  # 수동 실행 버튼

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: 주식 현재가 조회 및 DB 저장
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, urllib.parse, json, os, ssl

          SUPABASE_URL = os.environ['SUPABASE_URL']
          SERVICE_KEY  = os.environ['SUPABASE_SERVICE_KEY']

          # ── 1. 현재 보유중인 탑픽 종목코드 조회
          ctx = ssl.create_default_context()
          headers = {
            'apikey': SERVICE_KEY,
            'Authorization': 'Bearer ' + SERVICE_KEY,
            'Content-Type': 'application/json',
          }

          def supabase_get(path):
            req = urllib.request.Request(SUPABASE_URL + path, headers=headers)
            with urllib.request.urlopen(req, context=ctx, timeout=15) as r:
              return json.loads(r.read())

          def supabase_upsert(path, body):
            data = json.dumps(body).encode()
            req = urllib.request.Request(
              SUPABASE_URL + path,
              data=data,
              headers={**headers, 'Prefer': 'resolution=merge-duplicates'},
              method='POST'
            )
            with urllib.request.urlopen(req, context=ctx, timeout=15) as r:
              return r.status

          # 보유중 탑픽에서 종목코드 수집
          picks = supabase_get('/rest/v1/picks_with_trades?status=eq.hold&select=stock_code,stock_name,market')
          codes = {}
          for p in picks:
            if p.get('stock_code'):
              codes[p['stock_code']] = {
                'name': p.get('stock_name', ''),
                'market': p.get('market', 'KOSPI')
              }

          if not codes:
            print('보유중 종목 없음 — 종료')
            exit(0)

          print(f'조회할 종목: {list(codes.keys())}')

          # ── 2. Yahoo Finance에서 현재가 조회
          def fetch_yahoo(symbols_str):
            fields = 'regularMarketPrice,regularMarketChangePercent,shortName,marketCap'
            url = f'https://query1.finance.yahoo.com/v7/finance/quote?symbols={symbols_str}&fields={fields}'
            req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
            try:
              with urllib.request.urlopen(req, context=ctx, timeout=15) as r:
                return json.loads(r.read()).get('quoteResponse', {}).get('result', [])
            except Exception as e:
              print(f'  query1 실패: {e}')
              url2 = url.replace('query1', 'query2')
              req2 = urllib.request.Request(url2, headers={'User-Agent': 'Mozilla/5.0'})
              try:
                with urllib.request.urlopen(req2, context=ctx, timeout=15) as r:
                  return json.loads(r.read()).get('quoteResponse', {}).get('result', [])
              except Exception as e2:
                print(f'  query2 실패: {e2}')
                return []

          results = {}

          # KOSPI 시도
          ks_symbols = ','.join(c + '.KS' for c in codes)
          for q in fetch_yahoo(ks_symbols):
            code = q['symbol'].replace('.KS','').replace('.KQ','')
            if q.get('regularMarketPrice', 0) > 0:
              results[code] = q

          # 못 찾은 종목 KOSDAQ 재시도
          missing = [c for c in codes if c not in results]
          if missing:
            kq_symbols = ','.join(c + '.KQ' for c in missing)
            for q in fetch_yahoo(kq_symbols):
              code = q['symbol'].replace('.KS','').replace('.KQ','')
              if q.get('regularMarketPrice', 0) > 0:
                results[code] = q

          # ── 3. Supabase stock_prices 테이블에 저장
          upsert_rows = []
          for code, q in results.items():
            price     = round(q.get('regularMarketPrice', 0))
            change    = round(q.get('regularMarketChangePercent', 0), 2)
            mkt_cap   = q.get('marketCap')
            cap_uk    = round(mkt_cap / 100_000_000) if mkt_cap else None
            info      = codes.get(code, {})

            upsert_rows.append({
              'stock_code':  code,
              'stock_name':  info.get('name') or q.get('shortName', code),
              'market':      info.get('market', 'KOSPI'),
              'price':       price,
              'change_rate': change,
              'market_cap':  cap_uk,
              'updated_at':  'now()',
            })
            print(f'  {code} {info.get("name","")} : {price:,}원 ({change:+.2f}%)')

          if upsert_rows:
            status = supabase_upsert('/rest/v1/stock_prices', upsert_rows)
            print(f'\nDB 저장 완료 ({len(upsert_rows)}건, HTTP {status})')
          else:
            print('\n저장할 데이터 없음')

          PYEOF
