<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>투자 스터디 · 일정 관리</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 1px; background: var(--border); border-radius: var(--r-md); overflow: hidden; }
    .cal-head { background: var(--bg); padding: 8px 4px; text-align: center; font-size: 12px; font-weight: 500; color: var(--muted); }
    .cal-day  { background: var(--surface); padding: 6px 8px; min-height: 72px; cursor: pointer; }
    .cal-day:not(.other-month):hover { background: #f0f5fb; }
    .cal-day:hover { background: var(--bg); }
    .cal-day.today { background: #e6f1fb; }
    .cal-day.other-month .cal-day-num { color: var(--hint); }
    .cal-day-num  { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
    .cal-day.today .cal-day-num { color: #185fa5; }
    .cal-event { font-size: 11px; padding: 2px 5px; border-radius: 3px; margin-bottom: 2px; cursor: pointer; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .ev-meeting  { background: #e8f4fd; color: #0c447c; }
    .ev-deadline { background: #fdecea; color: #a32d2d; }
    .ev-other    { background: var(--bg); color: var(--muted); }
    .upcoming-item { display: flex; gap: 12px; align-items: flex-start; padding: 12px 0; border-bottom: 0.5px solid var(--border); }
    .upcoming-item:last-child { border-bottom: none; }
    .upcoming-date { min-width: 52px; text-align: center; background: var(--bg); border-radius: var(--r-md); padding: 6px 8px; }
    .upcoming-month { font-size: 11px; color: var(--muted); }
    .upcoming-day   { font-size: 20px; font-weight: 500; line-height: 1.2; }
    .ev-badge { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 3px; font-weight: 500; }
  </style>
</head>
<body>
<div class="layout">

  <nav class="sidebar">
    <a href="index.html" class="logo" style="text-decoration:none;color:inherit;cursor:pointer;">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <polyline points="1,12 5,7 9,9 15,3" stroke="#185fa5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="11,3 15,3 15,7" stroke="#185fa5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      투자 스터디
    </a>
    <a href="index.html" class="nav-item"><div class="nav-dot g"></div>대시보드</a>
    <a href="picks.html" class="nav-item"><div class="nav-dot"></div>탑픽 관리</a>
    <a href="trade.html" class="nav-item"><div class="nav-dot r"></div>매수 / 매도</a>
    <a href="members.html" class="nav-item"><div class="nav-dot"></div>참여자 현황</a>
    <a href="settle.html" class="nav-item"><div class="nav-dot a"></div>결산 관리</a>
    <a href="schedule.html" class="nav-item active"><div class="nav-dot g"></div>스터디 일정</a>
    <a href="admin.html" class="nav-item"><div class="nav-dot"></div>사용자 관리</a>
    <div class="sidebar-spacer"></div>
    <div class="sidebar-footer">
      <button class="btn" style="width:100%;font-size:12px;" onclick="doLogout()">로그아웃</button>
    </div>
  </nav>

  <main class="main">
    <div id="db-banner" class="db-banner pending">DB 연결 확인 중...</div>

    <div class="topbar">
      <div>
        <div class="page-title">스터디 일정</div>
        <div class="updated">미팅 · 탑픽 마감일 · 결산일 관리</div>
      </div>
      <button class="btn btn-primary" onclick="openForm()">+ 일정 추가</button>
    </div>

    <!-- 일정 추가/수정 폼 -->
    <div id="scheduleForm" class="card" style="display:none;margin-bottom:1.25rem;">
      <div class="card-head">
        <div class="card-title" id="formTitle">일정 추가</div>
        <button class="btn" onclick="closeForm()" style="font-size:12px;">닫기</button>
      </div>
      <div class="form-section">
        <div class="form-row">
          <div class="form-group">
            <label>제목 *</label>
            <input type="text" id="s-title" placeholder="예: 4월 월간 미팅" />
          </div>
          <div class="form-group">
            <label>구분</label>
            <select id="s-category">
              <option value="meeting">정기 미팅</option>
              <option value="deadline">마감일</option>
              <option value="other">기타</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>날짜 *</label>
            <input type="date" id="s-date" />
          </div>
          <div class="form-group">
            <label>시간</label>
            <input type="time" id="s-time" placeholder="예: 19:00" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>장소</label>
            <input type="text" id="s-location" placeholder="예: 강남 스터디카페" />
          </div>
          <div class="form-group">
            <label>등록자</label>
            <select id="s-member"><option value="">선택 (선택사항)</option></select>
          </div>
        </div>
        <div class="form-group">
          <label>메모</label>
          <textarea id="s-desc" placeholder="안건, 준비사항 등을 자유롭게 작성하세요" style="min-height:70px;"></textarea>
        </div>
        <div style="display:flex;justify-content:flex-end;gap:8px;">
          <button class="btn" onclick="closeForm()">취소</button>
          <button class="btn btn-primary" id="saveScheduleBtn" onclick="saveSchedule()">저장</button>
        </div>
      </div>
    </div>

    <div class="grid-2">

      <!-- 달력 -->
      <div class="card">
        <div class="card-head">
          <div style="display:flex;align-items:center;gap:12px;">
            <button class="btn" style="padding:4px 10px;font-size:16px;" onclick="prevMonth()">‹</button>
            <div class="card-title" id="calTitle" style="min-width:100px;text-align:center;">—</div>
            <button class="btn" style="padding:4px 10px;font-size:16px;" onclick="nextMonth()">›</button>
          </div>
          <button class="btn" style="font-size:12px;" onclick="goToday()">오늘</button>
        </div>
        <div class="cal-grid" id="calGrid">
          <div class="cal-head">일</div><div class="cal-head">월</div><div class="cal-head">화</div>
          <div class="cal-head">수</div><div class="cal-head">목</div><div class="cal-head">금</div>
          <div class="cal-head">토</div>
        </div>
      </div>

      <!-- 다가오는 일정 -->
      <div class="card">
        <div class="card-head"><div class="card-title">다가오는 일정</div></div>
        <div id="upcomingList">
          <div class="muted" style="text-align:center;padding:1.5rem;">불러오는 중...</div>
        </div>
      </div>

    </div>

    <!-- 전체 일정 목록 -->
    <div class="card" style="margin-top:1.25rem;">
      <div class="card-head">
        <div class="card-title">전체 일정</div>
        <select id="filterCat" onchange="renderScheduleList()" style="font-size:12px;padding:4px 8px;width:auto;">
          <option value="">전체</option>
          <option value="meeting">정기 미팅</option>
          <option value="deadline">마감일</option>
          <option value="other">기타</option>
        </select>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>날짜</th><th>제목</th><th>구분</th><th>시간</th><th>장소</th><th>메모</th><th style="width:100px;">작업</th>
          </tr></thead>
          <tbody id="scheduleListTbody">
            <tr><td colspan="7" class="muted" style="text-align:center;padding:1.5rem;">불러오는 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<!-- 상세 보기 모달 -->
<div id="detailModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:500;align-items:center;justify-content:center;">
  <div style="background:var(--surface);border-radius:var(--r-lg);padding:1.5rem;width:360px;border:0.5px solid var(--border);">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
      <div style="font-size:15px;font-weight:500;" id="detailTitle">—</div>
      <button class="btn" onclick="closeDetail()" style="font-size:12px;">닫기</button>
    </div>
    <div id="detailBody" style="font-size:13px;color:var(--muted);line-height:1.8;"></div>
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:1rem;">
      <button class="btn" id="detailEditBtn">수정</button>
      <button class="btn btn-danger" id="detailDeleteBtn">삭제</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script>
let schedules = [];
let members   = [];
let calYear   = new Date().getFullYear();
let calMonth  = new Date().getMonth(); // 0-indexed
let editingScheduleId = null;

const CAT_LABEL = { meeting: '정기 미팅', deadline: '마감일', other: '기타' };
const CAT_CLASS = { meeting: 'ev-meeting', deadline: 'ev-deadline', other: 'ev-other' };
const MONTH_KR  = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

async function init() {
  await requireAuth();
  checkDBConnection();
  [schedules, members] = await Promise.all([fetchSchedules(), fetchMembers()]);
  const sel = document.getElementById('s-member');
  members.forEach(m => sel.innerHTML += `<option value="${m.id}">${m.name}</option>`);
  renderCalendar();
  renderUpcoming();
  renderScheduleList();
}

// ── 달력 렌더링
function renderCalendar() {
  document.getElementById('calTitle').textContent = `${calYear}년 ${MONTH_KR[calMonth]}`;
  const grid = document.getElementById('calGrid');
  // 헤더 7개는 유지
  const headers = Array.from(grid.children).slice(0, 7);
  grid.innerHTML = '';
  headers.forEach(h => grid.appendChild(h));

  const today   = new Date();
  const first   = new Date(calYear, calMonth, 1);
  const last    = new Date(calYear, calMonth+1, 0);
  const startDay= first.getDay();

  // 이전 달 빈 칸
  for (let i = 0; i < startDay; i++) {
    const prevDate = new Date(calYear, calMonth, -startDay + i + 1);
    grid.appendChild(makeDay(prevDate, true));
  }
  // 이번 달
  for (let d = 1; d <= last.getDate(); d++) {
    const date  = new Date(calYear, calMonth, d);
    const isToday = date.toDateString() === today.toDateString();
    grid.appendChild(makeDay(date, false, isToday));
  }
  // 다음 달 빈 칸
  const remaining = 7 - ((startDay + last.getDate()) % 7);
  if (remaining < 7) {
    for (let d = 1; d <= remaining; d++) {
      grid.appendChild(makeDay(new Date(calYear, calMonth+1, d), true));
    }
  }
}

function makeDay(date, otherMonth, isToday=false) {
  const cell = document.createElement('div');
  cell.className = `cal-day${otherMonth?' other-month':''}${isToday?' today':''}`;
  const dateStr = date.toISOString().slice(0,10);
  const dayEvents = schedules.filter(s => s.event_date === dateStr);

  // 더블클릭으로 일정 추가
  cell.addEventListener('dblclick', (e) => {
    if (e.target.closest('.cal-event')) return; // 이벤트 클릭은 제외
    openForm({ event_date: dateStr });
  });
  cell.title = '더블클릭하면 일정을 추가할 수 있습니다';

  cell.innerHTML = `<div class="cal-day-num">${date.getDate()}</div>` +
    dayEvents.slice(0,3).map(ev =>
      `<div class="cal-event ${CAT_CLASS[ev.category]||'ev-other'}" onclick="showDetail('${ev.id}',event)">${ev.title}</div>`
    ).join('') +
    (dayEvents.length > 3 ? `<div style="font-size:10px;color:var(--muted);">+${dayEvents.length-3}개</div>` : '');
  return cell;
}

function prevMonth() { calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendar(); }
function nextMonth() { calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendar(); }
function goToday()   { const t=new Date(); calYear=t.getFullYear(); calMonth=t.getMonth(); renderCalendar(); }

// ── 다가오는 일정
function renderUpcoming() {
  const today = new Date().toISOString().slice(0,10);
  const upcoming = schedules
    .filter(s => s.event_date >= today)
    .sort((a,b) => a.event_date.localeCompare(b.event_date))
    .slice(0, 5);

  const el = document.getElementById('upcomingList');
  if (!upcoming.length) {
    el.innerHTML = '<div class="muted" style="text-align:center;padding:1rem;">예정된 일정이 없습니다</div>';
    return;
  }

  el.innerHTML = upcoming.map(s => {
    const d     = new Date(s.event_date + 'T00:00:00');
    const mon   = MONTH_KR[d.getMonth()];
    const day   = d.getDate();
    const dow   = ['일','월','화','수','목','금','토'][d.getDay()];
    const dDiff = Math.ceil((d - new Date(new Date().toDateString())) / 86400000);
    const dStr  = dDiff === 0 ? '오늘' : dDiff === 1 ? '내일' : `D-${dDiff}`;

    return `<div class="upcoming-item" onclick="showDetail('${s.id}',event)" style="cursor:pointer;">
      <div class="upcoming-date">
        <div class="upcoming-month">${mon}</div>
        <div class="upcoming-day">${day}</div>
        <div style="font-size:10px;color:var(--muted);">${dow}요일</div>
      </div>
      <div style="flex:1;">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;">
          <span class="ev-badge ${CAT_CLASS[s.category]||'ev-other'}">${CAT_LABEL[s.category]||'기타'}</span>
          <span style="font-size:11px;color:${dDiff<=3?'#a32d2d':'var(--muted)'};">${dStr}</span>
        </div>
        <div style="font-weight:500;font-size:14px;">${s.title}</div>
        ${s.event_time ? `<div style="font-size:12px;color:var(--muted);">${s.event_time.slice(0,5)}${s.location?' · '+s.location:''}</div>` : (s.location?`<div style="font-size:12px;color:var(--muted);">${s.location}</div>`:'')}
        ${s.description ? `<div style="font-size:12px;color:var(--muted);margin-top:2px;">${s.description}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

// ── 전체 목록
function renderScheduleList() {
  const cat = document.getElementById('filterCat').value;
  const list = schedules.filter(s => !cat || s.category === cat)
    .sort((a,b) => b.event_date.localeCompare(a.event_date));
  const tbody = document.getElementById('scheduleListTbody');
  if (!list.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="muted" style="text-align:center;padding:1.5rem;">일정이 없습니다</td></tr>';
    return;
  }
  const today = new Date().toISOString().slice(0,10);
  tbody.innerHTML = list.map(s => {
    const past = s.event_date < today;
    return `<tr style="${past?'opacity:0.55;':''}">
      <td style="white-space:nowrap;">${s.event_date}</td>
      <td style="font-weight:500;">${s.title}</td>
      <td><span class="ev-badge ${CAT_CLASS[s.category]||'ev-other'}">${CAT_LABEL[s.category]||'기타'}</span></td>
      <td class="muted">${s.event_time ? s.event_time.slice(0,5) : '-'}</td>
      <td class="muted">${s.location||'-'}</td>
      <td class="muted" style="font-size:12px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${s.description||'-'}</td>
      <td>
        <div style="display:flex;gap:4px;">
          <button class="btn" style="font-size:11px;padding:3px 8px;" onclick="editSchedule('${s.id}')">수정</button>
          <button class="btn" style="font-size:11px;padding:3px 8px;color:var(--up);border-color:var(--up);" onclick="confirmDelete('${s.id}')">삭제</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

// ── 폼
function openForm(prefill={}) {
  editingScheduleId = prefill.id || null;
  document.getElementById('formTitle').textContent = editingScheduleId ? '일정 수정' : '일정 추가';
  document.getElementById('s-title').value    = prefill.title       || '';
  document.getElementById('s-category').value = prefill.category    || 'meeting';
  document.getElementById('s-date').value     = prefill.event_date  || '';
  document.getElementById('s-time').value     = prefill.event_time  ? prefill.event_time.slice(0,5) : '';
  document.getElementById('s-location').value = prefill.location    || '';
  document.getElementById('s-member').value   = prefill.created_by  || '';
  document.getElementById('s-desc').value     = prefill.description || '';
  document.getElementById('scheduleForm').style.display = 'block';
  document.getElementById('scheduleForm').scrollIntoView({behavior:'smooth',block:'start'});
  // 날짜가 이미 채워져 있으면 제목으로 포커스, 아니면 날짜로
  setTimeout(() => {
    if (prefill.event_date) {
      document.getElementById('s-title').focus();
    } else {
      document.getElementById('s-date').focus();
    }
  }, 300);
}

function closeForm() {
  editingScheduleId = null;
  document.getElementById('scheduleForm').style.display = 'none';
}

function editSchedule(id) {
  const s = schedules.find(s => s.id === id);
  if (s) openForm(s);
}

async function saveSchedule() {
  const title    = document.getElementById('s-title').value.trim();
  const category = document.getElementById('s-category').value;
  const date     = document.getElementById('s-date').value;
  const time     = document.getElementById('s-time').value || null;
  const location = document.getElementById('s-location').value.trim() || null;
  const memberId = document.getElementById('s-member').value || null;
  const desc     = document.getElementById('s-desc').value.trim() || null;

  if (!title || !date) { toast('제목과 날짜는 필수입니다.'); return; }

  const btn = document.getElementById('saveScheduleBtn');
  btn.textContent = '저장 중...'; btn.disabled = true;

  try {
    const payload = { title, category, event_date: date, event_time: time, location, created_by: memberId, description: desc };
    if (editingScheduleId) {
      await updateSchedule(editingScheduleId, payload);
      toast('일정이 수정되었습니다.');
    } else {
      await submitSchedule(payload);
      toast('일정이 추가되었습니다!');
    }
    closeForm();
    schedules = await fetchSchedules();
    renderCalendar(); renderUpcoming(); renderScheduleList();
  } catch(e) { toast('오류: ' + e.message); }
  finally { btn.textContent = '저장'; btn.disabled = false; }
}

async function confirmDelete(id) {
  const s = schedules.find(s => s.id === id);
  if (!s || !confirm(`"${s.title}" 일정을 삭제할까요?`)) return;
  try {
    await deleteSchedule(id);
    toast('삭제되었습니다.');
    schedules = await fetchSchedules();
    renderCalendar(); renderUpcoming(); renderScheduleList();
  } catch(e) { toast('오류: ' + e.message); }
}

// ── 상세 모달
function showDetail(id, e) {
  e.stopPropagation();
  const s = schedules.find(s => s.id === id);
  if (!s) return;
  document.getElementById('detailTitle').textContent = s.title;
  document.getElementById('detailBody').innerHTML = [
    `<div><span style="color:var(--text);">날짜</span>: ${s.event_date}${s.event_time?' '+s.event_time.slice(0,5):''}</div>`,
    s.location ? `<div><span style="color:var(--text);">장소</span>: ${s.location}</div>` : '',
    `<div><span style="color:var(--text);">구분</span>: ${CAT_LABEL[s.category]||'기타'}</div>`,
    s.description ? `<div style="margin-top:8px;padding-top:8px;border-top:0.5px solid var(--border);">${s.description}</div>` : '',
  ].join('');
  document.getElementById('detailEditBtn').onclick   = () => { closeDetail(); editSchedule(id); };
  document.getElementById('detailDeleteBtn').onclick = () => { closeDetail(); confirmDelete(id); };
  document.getElementById('detailModal').style.display = 'flex';
}

function closeDetail() { document.getElementById('detailModal').style.display = 'none'; }

async function doLogout() { await sb.auth.signOut(); location.href = 'index.html'; }

init();
</script>
</body>
</html>
