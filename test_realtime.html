<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><title>실시간 주가 API 테스트</title></head>
<body style="font-family:monospace;padding:20px;background:#1a1a1a;color:#eee;">
<h3 style="color:#4fc3f7;">실시간 주가 API 테스트 (브라우저 직접 호출)</h3>
<pre id="out" style="background:#2d2d2d;padding:16px;border-radius:8px;white-space:pre-wrap;font-size:12px;min-height:200px;">테스트 중...</pre>

<script>
const el = document.getElementById('out');
function log(msg) { el.textContent += msg + '\n'; }
el.textContent = '';

async function testAll() {

  // 1. KIS Open API - 토큰 없이 접근 가능한 엔드포인트 있는지 테스트
  log('[1] KIS Open API 직접 호출...');
  try {
    const r = await fetch('https://openapi.koreainvestment.com:9443/uapi/domestic-stock/v1/quotations/inquire-price?fid_cond_mrkt_div_code=J&fid_input_iscd=005930', {
      headers: { 'content-type': 'application/json' }
    });
    log('  KIS 상태: ' + r.status + ' (401이면 토큰 필요, CORS오류면 브라우저 차단)');
  } catch(e) { log('  KIS 실패: ' + e.message); }

  // 2. 한국거래소 정보데이터시스템 API
  log('\n[2] KRX 정보데이터시스템...');
  try {
    const r = await fetch('http://data.krx.co.kr/comm/bldAttendant/getJsonData.cmd', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'bld=dbms/MDC/STAT/standard/MDCSTAT01501&isuCd=KR7005930003'
    });
    log('  KRX 상태: ' + r.status);
    if (r.ok) { const d = await r.json(); log('  결과: ' + JSON.stringify(d).slice(0,100)); }
  } catch(e) { log('  KRX 실패: ' + e.message); }

  // 3. 공공데이터포털 금융위원회 주식시세
  log('\n[3] 공공데이터포털 주식시세 API...');
  try {
    const r = await fetch('https://apis.data.go.kr/1160100/service/GetStockSecuritiesInfoService/getStockPriceInfo?serviceKey=test&numOfRows=1&pageNo=1&resultType=json&likeSrtnCd=005930');
    log('  공공API 상태: ' + r.status);
  } catch(e) { log('  공공API 실패: ' + e.message); }

  // 4. Naver 증권 - 여러 엔드포인트 시도
  log('\n[4] 네이버 증권 API들...');
  const naverApis = [
    `https://polling.finance.naver.com/api/realtime/domestic/stock/005930`,
    `https://finance.naver.com/item/sise.nhn?code=005930`,
    `https://m.stock.naver.com/api/stock/005930/basic`,
  ];
  for (const url of naverApis) {
    try {
      const r = await fetch(url, { headers: { 'Referer': 'https://finance.naver.com/' } });
      log(`  ${url.split('/').slice(-2).join('/')}: ${r.status}`);
      if (r.ok && r.headers.get('content-type')?.includes('json')) {
        const d = await r.json();
        log('  → ' + JSON.stringify(d).slice(0, 120));
      }
    } catch(e) { log(`  → 실패: ${e.message}`); }
  }

  // 5. investing.com API
  log('\n[5] Investing.com...');
  try {
    const r = await fetch('https://api.investing.com/api/financialdata/assets/equities?pairId=1003531&fields=last_close&timeframe=PT1M', {
      headers: { 'User-Agent': 'Mozilla/5.0', 'domain-id': 'kr' }
    });
    log('  Investing 상태: ' + r.status);
  } catch(e) { log('  Investing 실패: ' + e.message); }

  // 6. Daum 증권
  log('\n[6] 다음 증권 API...');
  try {
    const r = await fetch('https://finance.daum.net/api/quotes/A005930', {
      headers: { 'Referer': 'https://finance.daum.net/', 'User-Agent': 'Mozilla/5.0' }
    });
    log('  Daum 상태: ' + r.status);
    if (r.ok) {
      const d = await r.json();
      log('  → trade: ' + d?.tradePrice + ', change: ' + d?.changeRate);
    }
  } catch(e) { log('  Daum 실패: ' + e.message); }

  log('\n=== 완료 ===');
}

testAll();
</script>
</body>
</html>
