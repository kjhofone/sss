<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>투자 스터디 · 대시보드</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="layout">
  <nav class="sidebar">
    <a href="index.html" class="logo" style="text-decoration:none;color:inherit;cursor:pointer;">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <polyline points="1,12 5,7 9,9 15,3" stroke="#185fa5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="11,3 15,3 15,7" stroke="#185fa5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      투자 스터디
    </a>
    <a href="index.html" class="nav-item active"><div class="nav-dot g"></div>대시보드</a>
    <a href="picks.html" class="nav-item"><div class="nav-dot"></div>탑픽 관리</a>
    <a href="trade.html" class="nav-item"><div class="nav-dot r"></div>매수 / 매도</a>
    <a href="members.html" class="nav-item"><div class="nav-dot"></div>참여자 현황</a>
    <a href="settle.html" class="nav-item"><div class="nav-dot a"></div>결산 관리</a>
    <a href="schedule.html" class="nav-item"><div class="nav-dot g"></div>스터디 일정</a>
    <a href="admin.html" class="nav-item"><div class="nav-dot"></div>사용자 관리</a>
    <div class="sidebar-spacer"></div>
    <div class="sidebar-footer">
      <button class="btn" style="width:100%;font-size:12px;" onclick="doLogout()">로그아웃</button>
    </div>
  </nav>

  <main class="main">
    <div id="db-banner" class="db-banner pending">DB 연결 확인 중...</div>

    <div class="topbar">
      <div>
        <div class="page-title">대시보드</div>
        <div class="updated" id="updatedAt">불러오는 중...</div>
      </div>
      <div class="btn-row">
        <a href="trade.html?type=sell" class="btn">매도 요청</a>
        <button class="btn" id="quickRefreshBtn" onclick="triggerQuickRefresh()" title="탑픽 종목 현재가 즉시 업데이트">탑픽 즉시 업데이트</button>
        <a href="picks.html?action=new" class="btn btn-primary">+ 탑픽 제출</a>
      </div>
    </div>

    <div class="metric-grid">
      <div class="metric"><div class="metric-label">총 운용 자산</div><div class="metric-value" id="totalAsset">—</div><div class="metric-sub" id="totalProfit">—</div></div>
      <div class="metric"><div class="metric-label">평균 수익률</div><div class="metric-value" id="avgReturn">—</div><div class="metric-sub">수수료 반영 · 확정 기준</div></div>
      <div class="metric"><div class="metric-label">이번 달 탑픽 제출</div><div class="metric-value" id="pickStatus">—</div><div class="metric-sub" id="pickMissing">—</div></div>
      <div class="metric"><div class="metric-label">참여자 수</div><div class="metric-value" id="memberCount">—</div><div class="metric-sub">활성 참여자</div></div>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-head">
          <div class="card-title">이번 달 탑픽 <span id="priceUpdated" style="font-size:11px;color:var(--muted);font-weight:400;"></span></div>
          <div style="display:flex;align-items:center;gap:8px;">
            <button class="btn" style="font-size:12px;padding:4px 10px;" onclick="refreshPrices()">현재가 갱신</button>
            <a href="picks.html" style="font-size:12px;color:#185fa5;text-decoration:none;">전체 →</a>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>추천자</th><th>종목</th><th>매수가</th><th>현재가</th><th>등락</th><th>수익률</th><th>목표가</th><th>상태</th></tr></thead>
            <tbody id="picksTbody"><tr><td colspan="8" class="muted" style="text-align:center;padding:1.5rem;">불러오는 중...</td></tr></tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <div class="card-head"><div class="card-title">참여자 수익률</div></div>
        <div id="memberBars" style="display:flex;flex-direction:column;gap:8px;"></div>
        <div style="margin-top:14px;border-top:0.5px solid var(--border);padding-top:12px;">
          <div class="notice-list" id="notices"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-head">
        <div class="card-title">최근 매매 내역</div>
        <a href="trade.html" style="font-size:12px;color:#185fa5;text-decoration:none;">전체 →</a>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>일시</th><th>추천자</th><th>종목</th><th>구분</th><th>체결가</th><th>수량</th><th>금액</th></tr></thead>
          <tbody id="tradesTbody"><tr><td colspan="7" class="muted" style="text-align:center;padding:1.5rem;">불러오는 중...</td></tr></tbody>
        </table>
      </div>
    </div>
  </main>
</div>
<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script>
let currentPicks = [];
let currentMembers = [];

async function init() {
  await requireAuth();
  checkDBConnection();

  const now = new Date();
  document.getElementById('updatedAt').textContent =
    `${now.toLocaleDateString('ko-KR')} ${now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})} · 체결가 기준`;

  const [members, picks, trades] = await Promise.all([
    fetchMemberStats(),
    fetchPicksByMonth(currentMonth()),
    fetchTrades(8)
  ]);

  currentMembers = members;
  currentPicks   = picks;

  renderMetrics(members, picks);
  renderPicksTable(picks, {});
  renderMemberBars(members);
  renderNotices(members, picks);
  renderTradesTable(trades);

  // 비동기로 현재가 조회
  refreshPrices();
}

async function refreshPrices() {
  const holdPicks = currentPicks.filter(p => p.status === 'hold' && p.stock_code);
  if (!holdPicks.length) return;
  const codes = [...new Set(holdPicks.map(p => p.stock_code))];
  document.getElementById('priceUpdated').textContent = '현재가 조회 중...';
  const prices = await fetchCurrentPrices(codes);
  renderPicksTable(currentPicks, prices);
  const t = new Date();
  document.getElementById('priceUpdated').textContent =
    `현재가 ${t.getHours()}:${String(t.getMinutes()).padStart(2,'0')} 기준`;
}

function renderMetrics(members, picks) {
  const totalBase   = members.reduce((s,m) => s + m.base_amount, 0);
  const totalProfit = members.reduce((s,m) => s + m.net_profit, 0);
  const avgReturn   = members.length
    ? (members.reduce((s,m) => s + m.return_rate, 0) / members.length).toFixed(1) : 0;

  document.getElementById('totalAsset').textContent = won(totalBase);
  document.getElementById('totalProfit').textContent = `초기 대비 ${totalProfit>=0?'+':''}${won(totalProfit)}`;
  document.getElementById('avgReturn').textContent = pct(avgReturn);
  document.getElementById('avgReturn').className   = 'metric-value ' + rCls(avgReturn);
  document.getElementById('memberCount').textContent = members.length + '명';

  const submitted = picks.length;
  const missing   = members.filter(m => !picks.find(p => p.member_id === m.id));
  document.getElementById('pickStatus').textContent = `${submitted} / ${members.length}`;
  document.getElementById('pickMissing').innerHTML  = missing.length
    ? `<span class="badge b-warn">${missing.map(m=>m.name).join(', ')} 미제출</span>`
    : '<span class="badge b-sold">전원 제출 완료</span>';
}

function renderPicksTable(picks, prices) {
  const tbody = document.getElementById('picksTbody');
  if (!picks.length) {
    tbody.innerHTML = '<tr><td colspan="8" class="muted" style="text-align:center;padding:1.5rem;">이번 달 탑픽이 없습니다</td></tr>';
    return;
  }
  tbody.innerHTML = picks.map((p, i) => {
    const priceInfo = prices[p.stock_code];
    const curPrice  = priceInfo?.price;
    const dayChange = priceInfo?.change;

    // 현재가가 있으면 실시간 수익률, 없으면 확정 수익률
    let rateVal, rateStr;
    if (p.status === 'hold' && curPrice && p.buy_price) {
      rateVal = ((curPrice - p.buy_price) / p.buy_price * 100);
      rateStr = pct(rateVal);
    } else {
      rateVal = p.realized_return;
      rateStr = pct(rateVal);
    }

    const upside = p.target_price && (curPrice || p.buy_price)
      ? (((p.target_price - (curPrice||p.buy_price)) / (curPrice||p.buy_price)) * 100).toFixed(1)
      : null;

    const statusBadge = p.status === 'sold'
      ? '<span class="badge b-sold">매도완료</span>'
      : '<span class="badge b-hold">보유중</span>';

    const dayChangeEl = dayChange != null
      ? `<span style="font-size:11px;" class="${rCls(dayChange)}">${dayChange>=0?'+':''}${dayChange}%</span>`
      : '<span class="muted" style="font-size:11px;">-</span>';

    return `<tr>
      <td><div class="flex"><div class="avatar ${avCls[i%6]}">${(p.member_name||'').slice(0,2)}</div>${p.member_name}</div></td>
      <td style="font-weight:500;">${p.stock_name}<br><span style="font-size:11px;color:var(--muted);">${p.stock_code||''}</span></td>
      <td>${won(p.buy_price)}</td>
      <td>${curPrice ? won(curPrice) : '<span class="muted">-</span>'}</td>
      <td>${dayChangeEl}</td>
      <td class="${rCls(rateVal)}">${rateStr}</td>
      <td style="color:var(--green);">${p.target_price ? won(p.target_price)+(upside?`<br><span style="font-size:11px;">(+${upside}%)</span>`:'') : '-'}</td>
      <td>${statusBadge}</td>
    </tr>`;
  }).join('');
}

function renderMemberBars(members) {
  const sorted = [...members].sort((a,b) => b.return_rate - a.return_rate);
  const maxAbs = Math.max(...sorted.map(m => Math.abs(m.return_rate)), 1);
  document.getElementById('memberBars').innerHTML = sorted.map((m, i) => {
    const w = Math.round(Math.abs(m.return_rate) / maxAbs * 100);
    return `<div style="display:flex;align-items:center;gap:10px;padding:7px 10px;background:var(--bg);border-radius:var(--r-md);">
      <div class="avatar ${avCls[i%6]}" style="width:28px;height:28px;font-size:11px;">${m.name.slice(0,2)}</div>
      <div style="font-size:13px;font-weight:500;width:52px;flex-shrink:0;">${m.name}</div>
      <div style="flex:1;height:6px;background:var(--border);border-radius:4px;overflow:hidden;">
        <div class="prog-bar ${m.return_rate>=0?'bar-up':'bar-dn'}" style="width:${w}%;"></div>
      </div>
      <div class="${rCls(m.return_rate)}" style="font-size:12px;min-width:46px;text-align:right;">${pct(m.return_rate)}</div>
    </div>`;
  }).join('');
}

function renderNotices(members, picks) {
  const items = [];
  const missing = members.filter(m => !picks.find(p => p.member_id === m.id));
  if (missing.length) items.push(`<div class="notice"><div class="nd nd-warn"></div>${missing.map(m=>m.name).join(', ')}님 탑픽 미제출</div>`);
  members.filter(m => m.return_rate < 0).forEach(m =>
    items.push(`<div class="notice"><div class="nd nd-info"></div>${m.name}님 누적 ${pct(m.return_rate)} · 손실 중</div>`)
  );
  document.getElementById('notices').innerHTML = items.length
    ? items.join('') : '<div class="notice"><div class="nd nd-ok"></div>특이사항 없음</div>';
}

function renderTradesTable(trades) {
  const tbody = document.getElementById('tradesTbody');
  if (!trades.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="muted" style="text-align:center;padding:1.5rem;">매매 내역이 없습니다</td></tr>';
    return;
  }
  tbody.innerHTML = trades.map(t => {
    const d = new Date(t.traded_at);
    const ds = `${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
    return `<tr>
      <td class="muted">${ds}</td>
      <td>${t.members?.name||'-'}</td>
      <td style="font-weight:500;">${t.stock_name}</td>
      <td>${t.trade_type==='buy'?'<span class="badge b-buy">매수</span>':'<span class="badge b-sell">매도</span>'}</td>
      <td>${won(t.price)}</td>
      <td>${t.quantity}주</td>
      <td>${won(t.price*t.quantity)}</td>
    </tr>`;
  }).join('');
}

// ── 탑픽 즉시 업데이트 (GitHub Actions 트리거)
async function triggerQuickRefresh() {
  const pat  = await getAppSetting('gh_pat');
  const repo = window.GH_REPO;

  if (!pat) {
    toast('현재가 관리 페이지에서 PAT를 먼저 설정하세요.');
    return;
  }
  if (!repo || repo.includes('YOUR_GITHUB_ID')) {
    toast('config.js에서 GH_REPO를 설정하세요.');
    return;
  }

  const btn = document.getElementById('quickRefreshBtn');
  btn.disabled = true;
  btn.textContent = '업데이트 중...';

  try {
    const res = await fetch(
      `https://api.github.com/repos/${repo}/actions/workflows/refresh_picks.yml/dispatches`,
      {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${pat}`,
          'Accept': 'application/vnd.github+json',
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ ref: 'main' }),
      }
    );

    if (res.status === 204) {
      toast('✅ 업데이트 시작! 약 60초 후 새로고침하세요.');
      btn.textContent = '업데이트 중... (60초)';
      setTimeout(() => {
        btn.disabled = false;
        btn.textContent = '탑픽 즉시 업데이트';
        refreshPrices();
      }, 65000);
    } else {
      throw new Error(`HTTP ${res.status}`);
    }
  } catch(e) {
    toast('오류: ' + e.message);
    btn.disabled = false;
    btn.textContent = '탑픽 즉시 업데이트';
  }
}

init();
</script>
</body>
</html>
