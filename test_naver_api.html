<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><title>네이버 API 구조 확인</title></head>
<body style="font-family:monospace;padding:20px;background:#1a1a1a;color:#eee;">
<h3 style="color:#4fc3f7;">네이버 금융 API 응답 구조 확인</h3>
<div style="margin-bottom:12px;">
  <input id="code" value="005930" style="background:#2d2d2d;color:#eee;border:1px solid #555;padding:8px;border-radius:4px;width:120px;" />
  <button onclick="check()" style="background:#185fa5;color:white;border:none;padding:8px 16px;border-radius:4px;cursor:pointer;margin-left:8px;">확인</button>
</div>
<pre id="out" style="background:#2d2d2d;padding:16px;border-radius:8px;white-space:pre-wrap;word-break:break-all;font-size:12px;max-height:600px;overflow-y:auto;">버튼을 누르세요</pre>

<script>
async function check() {
  const code = document.getElementById('code').value.trim();
  const el = document.getElementById('out');
  el.textContent = '조회 중...';

  const url = `https://m.stock.naver.com/api/stock/${code}/basic`;
  try {
    const r = await fetch(url, {
      headers: {
        'User-Agent': 'Mozilla/5.0 (iPhone; CPU iPhone OS 16_0 like Mac OS X)',
        'Referer': 'https://m.stock.naver.com/',
        'Accept': 'application/json',
      }
    });
    el.textContent = `HTTP 상태: ${r.status}\n\n`;
    if (!r.ok) { el.textContent += '실패'; return; }
    const data = await r.json();
    el.textContent += JSON.stringify(data, null, 2);

    // 주요 필드 파싱 시도
    el.textContent += '\n\n=== 파싱 결과 ===\n';
    el.textContent += '최상위 키: ' + Object.keys(data).join(', ') + '\n';
    
    // 가격 관련 필드 찾기
    const priceFields = ['closePrice','currentPrice','now','price','stockPrice'];
    for (const f of priceFields) {
      if (data[f] !== undefined) el.textContent += `가격 필드 "${f}": ${data[f]}\n`;
    }
    
    // 등락률
    const changeFields = ['fluctuationsRatio','changeRate','priceChange'];
    for (const f of changeFields) {
      if (data[f] !== undefined) el.textContent += `등락률 필드 "${f}": ${data[f]}\n`;
    }

    // stockItemTotalInfos 있으면 키 목록
    if (Array.isArray(data.stockItemTotalInfos)) {
      el.textContent += '\nstockItemTotalInfos 키 목록:\n';
      data.stockItemTotalInfos.forEach(item => {
        el.textContent += `  key="${item.key}" value="${item.value}"\n`;
      });
    }
  } catch(e) {
    el.textContent = '오류: ' + e.message;
  }
}
</script>
</body>
</html>
