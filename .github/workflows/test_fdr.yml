name: FDR 데이터 확인

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 패키지 설치
        run: pip install finance-datareader -q

      - name: Close 값 확인
        run: |
          python3 - << 'PYEOF'
          import FinanceDataReader as fdr

          kospi = fdr.StockListing('KOSPI')
          print('컬럼:', list(kospi.columns))
          print()
          print('상위 5개 종목:')
          print(kospi[['Code','Name','Close','ChagesRatio','Marcap']].head(5).to_string())
          print()
          
          # Close가 0이 아닌 종목 수
          has_price = (kospi['Close'] > 0).sum()
          print(f'Close > 0 인 종목: {has_price}/{len(kospi)}개')
          print(f'Close 샘플값: {kospi["Close"].head(10).tolist()}')
          PYEOF
