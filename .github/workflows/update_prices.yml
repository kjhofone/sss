name: 주식 현재가 자동 업데이트

on:
  schedule:
    - cron: '10 7 * * 1-5'   # KST 16:10 장 마감 후
    - cron: '0 3 * * 1-5'    # KST 12:00 장중
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 패키지 설치
        run: pip install finance-datareader -q

      - name: 현재가 업데이트
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 - << 'PYEOF'
          import json, os, ssl, time, datetime
          import urllib.request
          import FinanceDataReader as fdr

          SUPABASE_URL = os.environ['SUPABASE_URL']
          SERVICE_KEY  = os.environ['SUPABASE_SERVICE_KEY']
          ctx = ssl.create_default_context()

          sb_headers = {
            'apikey': SERVICE_KEY,
            'Authorization': 'Bearer ' + SERVICE_KEY,
            'Content-Type': 'application/json',
            'Prefer': 'resolution=merge-duplicates',
          }

          def supabase_get(path):
            req = urllib.request.Request(SUPABASE_URL + path, headers=sb_headers)
            with urllib.request.urlopen(req, context=ctx, timeout=15) as r:
              return json.loads(r.read())

          def supabase_upsert(rows):
            data = json.dumps(rows).encode()
            req = urllib.request.Request(
              SUPABASE_URL + '/rest/v1/stock_prices',
              data=data, headers=sb_headers, method='POST'
            )
            with urllib.request.urlopen(req, context=ctx, timeout=30) as r:
              r.read()
              return r.status

          # 1. 전체 종목 조회
          all_stocks = supabase_get('/rest/v1/stock_prices?select=stock_code,stock_name,market&limit=5000')
          print(f'DB 등록 종목: {len(all_stocks)}개')

          if not all_stocks:
            print('종목 없음 — init_all_stocks.yml 먼저 실행하세요')
            exit(0)

          # 2. FDR로 전체 현재가 조회 (KRX 일괄 조회가 가장 빠름)
          today    = datetime.date.today().strftime('%Y-%m-%d')
          week_ago = (datetime.date.today() - datetime.timedelta(days=7)).strftime('%Y-%m-%d')
          now_iso  = datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')

          # KRX 전체 시세 한 번에 가져오기 (개별 조회보다 훨씬 빠름)
          print('KRX 전체 시세 로딩...')
          krx_prices = {}
          krx_caps   = {}

          try:
            import pandas as pd
            kospi_list  = fdr.StockListing('KOSPI')
            kosdaq_list = fdr.StockListing('KOSDAQ')

            for df in [kospi_list, kosdaq_list]:
              # 컬럼명 자동 감지
              code_col  = next((c for c in ['Code','code','Symbol'] if c in df.columns), df.columns[0])
              close_col = next((c for c in ['Close','close','Adj Close','현재가','종가'] if c in df.columns), None)
              cap_col   = next((c for c in ['Marcap','MarCap','marcap','시가총액'] if c in df.columns), None)
              chg_col   = next((c for c in ['ChgRatio','chgRatio','등락률','Change'] if c in df.columns), None)

              for _, row in df.iterrows():
                code = str(row[code_col]).strip().zfill(6)
                if close_col and row[close_col]:
                  try: krx_prices[code] = int(float(row[close_col]))
                  except: pass
                if cap_col and row[cap_col]:
                  try:
                    v = float(row[cap_col])
                    krx_caps[code] = int(v // 100_000_000) if v > 100_000_000_000 else int(v)
                  except: pass

            print(f'KRX 시세 로드: {len(krx_prices)}개')
          except Exception as e:
            print(f'KRX 전체 시세 실패: {e}')
            print('개별 종목 조회로 전환...')

          # 3. DB 업데이트
          rows = []
          updated = 0
          skipped = 0

          for s in all_stocks:
            code = s['stock_code']
            price = krx_prices.get(code, 0)

            if price > 0:
              rows.append({
                'stock_code':  code,
                'stock_name':  s['stock_name'],
                'market':      s['market'],
                'price':       price,
                'change_rate': 0.0,
                'market_cap':  krx_caps.get(code),
                'updated_at':  now_iso,
              })
              updated += 1
            else:
              skipped += 1

          print(f'업데이트: {updated}개, 가격없음: {skipped}개')

          # 100개씩 배치 저장
          BATCH = 100
          saved = 0
          for i in range(0, len(rows), BATCH):
            batch = rows[i:i+BATCH]
            try:
              supabase_upsert(batch)
              saved += len(batch)
              if (i // BATCH) % 20 == 0:
                print(f'  저장 진행: {saved}/{len(rows)}')
            except Exception as e:
              print(f'  배치 오류: {e}')
            time.sleep(0.05)

          print(f'\n✅ 완료: {saved}개 현재가 업데이트')
          PYEOF
