name: 주식 현재가 자동 업데이트

on:
  schedule:
    - cron: '10 7 * * 1-5'
    - cron: '0 3 * * 1-5'
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: 패키지 설치
        run: pip install finance-datareader requests -q

      - name: 주식 현재가 조회 및 DB 저장
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 - << 'PYEOF'
          import json, os, ssl, time
          import urllib.request

          SUPABASE_URL = os.environ['SUPABASE_URL']
          SERVICE_KEY  = os.environ['SUPABASE_SERVICE_KEY']
          ctx = ssl.create_default_context()

          sb_headers = {
            'apikey': SERVICE_KEY,
            'Authorization': 'Bearer ' + SERVICE_KEY,
            'Content-Type': 'application/json',
          }

          def supabase_get(path):
            req = urllib.request.Request(SUPABASE_URL + path, headers=sb_headers)
            with urllib.request.urlopen(req, context=ctx, timeout=15) as r:
              return json.loads(r.read())

          def supabase_upsert(body):
            data = json.dumps(body).encode()
            req = urllib.request.Request(
              SUPABASE_URL + '/rest/v1/stock_prices',
              data=data,
              headers={**sb_headers, 'Prefer': 'resolution=merge-duplicates'},
              method='POST'
            )
            with urllib.request.urlopen(req, context=ctx, timeout=15) as r:
              return r.status

          picks = supabase_get('/rest/v1/picks_with_trades?status=eq.hold&select=stock_code,stock_name,market')
          codes = {}
          for p in picks:
            if p.get('stock_code'):
              codes[p['stock_code']] = {'name': p.get('stock_name',''), 'market': p.get('market','KOSPI')}

          if not codes:
            print('보유중 종목 없음')
            exit(0)

          print(f'조회 종목: {list(codes.keys())}')

          import FinanceDataReader as fdr
          import datetime

          today = datetime.date.today().strftime('%Y-%m-%d')
          yesterday = (datetime.date.today() - datetime.timedelta(days=7)).strftime('%Y-%m-%d')

          rows = []
          for code, info in codes.items():
            try:
              df = fdr.DataReader(code, yesterday, today)
              if df.empty:
                print(f'  {code}: 데이터 없음')
                continue
              row = df.iloc[-1]
              close_col = 'Close' if 'Close' in df.columns else 'close'
              price = int(row[close_col])
              
              # 등락률 계산
              if len(df) >= 2:
                prev = int(df.iloc[-2][close_col])
                change = round((price - prev) / prev * 100, 2) if prev > 0 else 0
              else:
                change = 0

              rows.append({
                'stock_code':  code,
                'stock_name':  info['name'],
                'market':      info['market'],
                'price':       price,
                'change_rate': change,
                'market_cap':  None,
                'updated_at':  'now()',
              })
              print(f'  {code} {info["name"]}: {price:,}원 ({change:+.2f}%)')
              time.sleep(0.2)
            except Exception as e:
              print(f'  {code} 실패: {e}')

          if not rows:
            print('저장할 데이터 없음')
            exit(1)

          status = supabase_upsert(rows)
          print(f'DB 저장 완료 {len(rows)}건 HTTP {status}')
          PYEOF

