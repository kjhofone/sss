name: 주식 현재가 자동 업데이트

on:
  schedule:
    - cron: '10 7 * * 1-5'   # KST 16:10 장 마감 후
    - cron: '0 3 * * 1-5'    # KST 12:00 장중
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 패키지 설치
        run: pip install finance-datareader -q

      - name: 현재가 업데이트
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 - << 'PYEOF'
          import json, os, ssl, time, datetime
          import urllib.request
          import FinanceDataReader as fdr

          SUPABASE_URL = os.environ['SUPABASE_URL']
          SERVICE_KEY  = os.environ['SUPABASE_SERVICE_KEY']
          ctx = ssl.create_default_context()

          sb_headers = {
            'apikey': SERVICE_KEY,
            'Authorization': 'Bearer ' + SERVICE_KEY,
            'Content-Type': 'application/json',
            'Prefer': 'resolution=merge-duplicates',
          }

          def supabase_upsert_batch(rows):
            data = json.dumps(rows).encode()
            req = urllib.request.Request(
              SUPABASE_URL + '/rest/v1/stock_prices',
              data=data, headers=sb_headers, method='POST'
            )
            with urllib.request.urlopen(req, context=ctx, timeout=30) as r:
              r.read()
              return r.status

          now_iso = datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')

          # KRX 전종목 시세 한 번에 로딩
          print('KRX 전종목 시세 로딩...')
          kospi  = fdr.StockListing('KOSPI')
          kosdaq = fdr.StockListing('KOSDAQ')
          print(f'KOSPI: {len(kospi)}개, KOSDAQ: {len(kosdaq)}개')

          rows = []
          for df, market in [(kospi, 'KOSPI'), (kosdaq, 'KOSDAQ')]:
            for _, row in df.iterrows():
              code = str(row.get('Code', '')).strip().zfill(6)
              name = str(row.get('Name', '')).strip()
              if not code or not name or code == '000000' or name == 'nan':
                continue

              price = 0
              try:
                v = row.get('Close', 0)
                if v and float(v) > 0:
                  price = int(float(v))
              except: pass

              if price == 0:
                continue  # 가격 없는 종목 스킵

              market_cap = None
              try:
                v = row.get('Marcap', 0)
                if v and float(v) > 0:
                  market_cap = int(float(v) // 100_000_000)
              except: pass

              change_rate = 0.0
              try:
                v = row.get('ChagesRatio', 0)
                if v:
                  change_rate = round(float(v), 2)
              except: pass

              rows.append({
                'stock_code':  code,
                'stock_name':  name,
                'market':      market,
                'price':       price,
                'change_rate': change_rate,
                'market_cap':  market_cap,
                'updated_at':  now_iso,
              })

          print(f'현재가 있는 종목: {len(rows)}개')

          # 100개씩 배치 저장
          BATCH = 100
          saved = 0
          for i in range(0, len(rows), BATCH):
            batch = rows[i:i+BATCH]
            try:
              supabase_upsert_batch(batch)
              saved += len(batch)
              if (i // BATCH) % 20 == 0:
                print(f'  저장: {saved}/{len(rows)}')
            except Exception as e:
              print(f'  배치 오류: {e}')
            time.sleep(0.05)

          print(f'✅ 완료: {saved}개 업데이트')
          PYEOF
